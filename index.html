<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>زار الطاولي العراقي - نسخة المقهى</title>
    
    <!-- تاغات المشاركة الفخمة للواتساب والتليجرام -->
    <meta property="og:title" content="زار الطاولي العراقي - نسخة المقهى">
    <meta property="og:description" content="لعبة زار تفاعلية بأجواء المقاهي البغدادية والتراث العراقي الأصيل">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/casino-dice.png">

    <!-- استدعاء مكتبة ساوند كلاود الرسمية للتحكم بالأغاني برمجياً -->
    <script src="https://w.soundcloud.com/player/api.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght=500;700;900&display=swap');

        :root {
            --bg-saj: #05060a;
            --panel-dark: #0b0e15;
            --iraqi-shadhar: #00d2ff;
            --iraqi-kahraman: #ffb300;
            --soundcloud-orange: #ff5500;
            --soft-green: #2ecc71;
            --btn-disabled: #131722;
        }

        body { 
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-saj); 
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .player-zone { 
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--panel-dark); position: relative;
            padding: 10px 15px; box-sizing: border-box;
            transition: all 0.3s ease; border: 2px solid transparent;
        }

        .top-player { transform: rotate(180deg); }

        .center-bar {
            background: #0e121a;
            border-top: 1px dashed rgba(0, 210, 255, 0.15);
            border-bottom: 1px dashed rgba(255, 179, 0, 0.15);
            padding: 6px 10px; display: flex;
            justify-content: space-between; align-items: center;
            z-index: 10; gap: 8px;
        }

        .top-player.active-turn { border-color: rgba(255, 179, 0, 0.25); box-shadow: inset 0 0 20px rgba(255, 179, 0, 0.05); }
        .bottom-player.active-turn { border-color: rgba(0, 210, 255, 0.25); box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.05); }
        
        @keyframes shadharFlash {
            0% { background: var(--panel-dark); box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.1); }
            50% { background: #07161f; box-shadow: inset 0 0 40px rgba(0, 210, 255, 0.5); }
            100% { background: var(--panel-dark); box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.1); }
        }
        @keyframes kahramanFlash {
            0% { background: var(--panel-dark); box-shadow: inset 0 0 20px rgba(255, 179, 0, 0.1); }
            50% { background: #1a1407; box-shadow: inset 0 0 40px rgba(255, 179, 0, 0.5); }
            100% { background: var(--panel-dark); box-shadow: inset 0 0 20px rgba(255, 179, 0, 0.1); }
        }
        .flash-shadhar-active { animation: shadharFlash 0.5s ease-in-out 3; }
        .flash-kahraman-active { animation: kahramanFlash 0.5s ease-in-out 3; }

        .player-header {
            display: flex; justify-content: space-between; align-items: center;
            width: 90%; max-width: 320px; margin-bottom: 5px;
        }

        .name-input {
            background: transparent; border: none; border-bottom: 1px dashed rgba(255,255,255,0.08);
            color: #cbd5e1; font-size: 14px; font-weight: 700; width: 110px; padding: 2px;
            font-family: 'Tajawal', sans-serif;
        }
        .top-player .name-input { text-align: right; }
        .name-input:focus { outline: none; border-bottom-color: var(--iraqi-shadhar); color: #fff; }

        .score-box {
            display: flex; align-items: center; gap: 6px; background: #121622;
            padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.02);
        }
        .score-val { color: var(--soft-green); font-weight: 700; font-size: 13px; }
        .score-btn { background: none; border: none; color: #5c6b84; cursor: pointer; font-size: 14px; font-weight: bold; }

        .dice-row { display: flex; justify-content: center; gap: 25px; margin-bottom: 8px; }
        
        .cyber-cube { 
            font-size: 46px; font-weight: 900; width: 78px; height: 78px; line-height: 78px; 
            border-radius: 22px; background: #121622; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.02); transition: all 0.2s;
        }

        .p-shadhar { color: var(--iraqi-shadhar); border-color: rgba(0, 210, 255, 0.15); }
        .p-kahraman { color: var(--iraqi-kahraman); border-color: rgba(255, 179, 0, 0.15); }

        .cyber-cube.rolling { animation: smoothSpin 0.08s infinite alternate; }
        @keyframes smoothSpin { 0% { transform: scale(1) rotate(-3deg); } 100% { transform: scale(0.95) rotate(3deg); } }

        .combo-name { font-size: 19px; font-weight: 700; height: 26px; margin-bottom: 10px; color: #ffffff; }

        .action-btn { 
            padding: 12px 0; width: 75%; max-width: 240px; font-size: 14px; font-weight: 700; 
            border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s;
            background: var(--btn-disabled); color: #44516d; pointer-events: none;
            font-family: 'Tajawal', sans-serif;
        }

        .bottom-player.active-turn .action-btn { background: linear-gradient(135deg, #00d2ff, #00a2cc); color: #05060a; pointer-events: auto; box-shadow: 0 4px 12px rgba(0, 210, 255, 0.25); }
        .top-player.active-turn .action-btn { background: linear-gradient(135deg, #ffb300, #cc8f00); color: #05060a; pointer-events: auto; box-shadow: 0 4px 12px rgba(255, 179, 0, 0.25); }

        .center-btn {
            background: #141924; border: 1px solid #20293a; color: #cbd5e1;
            padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: 0.2s; font-family: 'Tajawal', sans-serif;
        }

        /* زر ساوند كلاود البرتقالي المتوهج */
        .tarab-btn {
            background: rgba(255, 85, 0, 0.04);
            border: 1px solid rgba(255, 85, 0, 0.25);
            color: var(--soundcloud-orange);
            padding: 6px 12px;
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif; flex: 1; justify-content: center; max-width: 150px;
        }
        .tarab-btn.playing {
            background: rgba(255, 85, 0, 0.15);
            border-color: var(--soundcloud-orange);
            box-shadow: 0 0 12px rgba(255, 85, 0, 0.25);
        }

        .audio-visualizer {
            display: flex; align-items: flex-end; gap: 2px; width: 12px; height: 10px;
        }
        .audio-visualizer span {
            display: block; width: 2px; background: var(--soundcloud-orange); height: 2px; border-radius: 0.5px;
        }
        .tarab-btn.playing .audio-visualizer span {
            animation: bounceVisualizer 0.5s infinite alternate;
        }
        .tarab-btn.playing .audio-visualizer span:nth-child(2) { animation-delay: 0.15s; }
        .tarab-btn.playing .audio-visualizer span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounceVisualizer { 0% { height: 2px; } 100% { height: 10px; } }

        .history-container { width: 88%; max-width: 320px; margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
        .history-label { font-size: 10px; color: #49566e; text-align: right; }
        .history-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 2px; scrollbar-width: none; }
        .history-scroll::-webkit-scrollbar { display: none; }

        .history-card { 
            background: #111520; padding: 5px 12px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.02); font-size: 11px;
            display: inline-flex; align-items: center; gap: 6px; color: #cbd5e1;
        }
        .card-p1 { border-left: 2px solid var(--iraqi-shadhar); }
        .card-p2 { border-left: 2px solid var(--iraqi-kahraman); }
        .card-nums { font-weight: bold; color: #fff; }
        .card-text { font-size: 10px; color: var(--iraqi-shadhar); }
        .card-p2 .card-text { color: var(--iraqi-kahraman); }

        .shake-hint { font-size: 9px; color: #161c26; margin-top: 4px; }

        /* مشغل ساوند كلاود المخفي */
        #soundcloud-hidden-player {
            position: absolute; left: -9999px; top: -9999px;
            width: 1px; height: 1px; visibility: hidden;
        }
    </style>
</head>
<body>

    <!-- اللاعب 2 -->
    <div class="player-zone top-player" id="zone-2">
        <div class="player-header">
            <input type="text" class="name-input" value="اللاعب 2" id="name-p2" onchange="saveAndSync()">
            <div class="score-box">
                <button class="score-btn" onclick="addScore(2)">+</button>
                <span class="score-val" id="score-2">الفوز: 0</span>
            </div>
        </div>
        <div class="combo-name" id="combo-2">- جاهز عيني -</div>
        <div class="dice-row">
            <div id="p2-d1" class="cyber-cube p-shadhar">6</div>
            <div id="p2-d2" class="cyber-cube p-kahraman">6</div>
        </div>
        <button class="action-btn" onclick="roll(2); requestSensorPermission();">إرمي الزار يا بطل</button>
        <div class="history-container">
            <div class="history-label">سجل رميات المقهى الكلي:</div>
            <div class="history-scroll" id="history-2"></div>
        </div>
        <div class="shake-hint" id="shake-p2">أو هز التلفون حتى ترمي</div>
    </div>

    <!-- الحزام المركزي العراقي المطور -->
    <div class="center-bar">
        <button class="center-btn" onclick="determineStarter(); requestSensorPermission();" style="padding: 6px 8px;">🎲 منو يبدي?</button>
        
        <!-- زر ساوند كلاود المطور بنظام الاستدعاء المباشر المانع للحجب -->
        <button class="tarab-btn" id="tarabRadioBtn" onclick="toggleSoundCloudRandom(); requestSensorPermission();">
            <div class="audio-visualizer" id="audioVis">
                <span></span><span></span><span></span>
            </div>
            <span id="tarabTrackName">☁️ أثير ساوند كلاود</span>
        </button>

        <div style="display: flex; gap: 4px; align-items: center;">
            <button class="center-btn" onclick="toggleFullscreen()" style="padding: 6px 6px;">🖥️</button>
            <select class="sound-select" id="soundProfile">
                <option value="wood">🪵 خشب</option>
                <option value="crystal">💎 عاج</option>
            </select>
        </div>
    </div>

    <!-- قائمة تشغيل الساوند كلاود الخاصة بك -->
    <iframe id="soundcloud-hidden-player" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/ganat-ganat-412122592/sets/j0eltcfsmhvv&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false" allow="autoplay"></iframe>

    <!-- اللاعب 1 -->
    <div class="player-zone bottom-player active-turn" id="zone-1">
        <div class="player-header">
            <input type="text" class="name-input" value="اللاعب 1" id="name-p1" onchange="saveAndSync()">
            <div class="score-box">
                <button class="score-btn" onclick="addScore(1)">+</button>
                <span class="score-val" id="score-1">الفوز: 0</span>
            </div>
        </div>
        <div class="combo-name" id="combo-1">- صار دورك عيني -</div>
        <div class="dice-row">
            <div id="p1-d1" class="cyber-cube p-shadhar">6</div>
            <div id="p1-d2" class="cyber-cube p-kahraman">6</div>
        </div>
        <button class="action-btn" onclick="roll(1); requestSensorPermission();">إرمي الزار يا بطل</button>
        <div class="history-container">
            <div class="history-label">سجل رميات المقهى الكلي:</div>
            <div class="history-scroll" id="history-1"></div>
        </div>
        <div class="shake-hint" id="shake-p1">أو هز التلفون حتى ترمي</div>
    </div>

    <script>
        let activePlayer = 1; 
        let isRolling = false;
        let winScores = { 1: 0, 2: 0 };
        let wakeLock = null;
        let motionPermissionGranted = false;

        // ربط وهندسة مشغل ساوند كلاود
        let scIframe = document.getElementById('soundcloud-hidden-player');
        let scWidget = SC.Widget(scIframe);
        let isWidgetReady = false;
        let totalTracksCount = 0; // تخزين عدد الأغاني لمنع حظر الصوت بالموبايل

        scWidget.bind(SC.Widget.Events.READY, function() {
            isWidgetReady = true;
            // جلب عدد الأغاني مسبقاً وتخزينه في الذاكرة لتفادي الـ Async الحاظر للصوت
            scWidget.getSounds(function(sounds) {
                if (sounds && sounds.length > 0) {
                    totalTracksCount = sounds.length;
                }
            });
        });

        scWidget.bind(SC.Widget.Events.PLAY, function() {
            scWidget.getCurrentSound(function(sound) {
                if (sound) {
                    let trackName = sound.title.length > 15 ? sound.title.substring(0, 14) + ".." : sound.title;
                    document.getElementById('tarabTrackName').innerText = "🎶 " + trackName;
                }
            });
            document.getElementById('audioVis').classList.add('playing');
            document.getElementById('tarabRadioBtn').classList.add('playing');
        });

        scWidget.bind(SC.Widget.Events.PAUSE, function() {
            document.getElementById('tarabTrackName').innerText = "استراحة نغم";
            document.getElementById('audioVis').classList.remove('playing');
            document.getElementById('tarabRadioBtn').classList.remove('playing');
        });

        // دالة التبديل العشوائي الفورية المتوافقة مع حماية الموبايل (User Gesture Strict Mode)
        function toggleSoundCloudRandom() {
            if (!scWidget) return;
            
            // إذا لم تجهز الأكواد بعد، يعمل كـ Play/Pause تقليدي لحين جلب البيانات
            if (!isWidgetReady || totalTracksCount === 0) {
                scWidget.toggle();
                return;
            }
            
            // اختيار فوري ومتزامن يكسر حظر المتصفح
            let randomIndex = Math.floor(Math.random() * totalTracksCount);
            scWidget.skip(randomIndex);
            scWidget.play();
        }

        async function requestSensorPermission() {
            if (motionPermissionGranted) return;
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const status = await DeviceMotionEvent.requestPermission();
                    if (status === 'granted') {
                        motionPermissionGranted = true;
                        document.getElementById('shake-p1').innerText = "📱 مستشعر الهز فعال";
                        document.getElementById('shake-p2').innerText = "📱 مستشعر الهز فعال";
                    }
                } catch (e) {}
            } else {
                motionPermissionGranted = true;
            }
        }

        const singleNames = { 1: "يك", 2: "دو", 3: "سه", 4: "جهار", 5: "بنج", 6: "شش" };
        
        function getComboName(r1, r2) {
            if (r1 === r2) {
                return { 1: "هب يك!", 2: "دُبَرا!", 3: "دُوسة!", 4: "دورْجي!", 5: "دَبَش!", 6: "دوش الباشا!!" }[r1];
            }
            const high = Math.max(r1, r2); const low = Math.min(r1, r2);
            if (high === 6 && low === 5) return "شيش بيش!";
            if (high === 6 && low === 4) return "شيش جهار";
            if (high === 6 && low === 3) return "شيش سه";
            if (high === 6 && low === 2) return "شيش دو";
            if (high === 6 && low === 1) return "شيش يك";
            if (high === 5 && low === 4) return "بنج جهار";
            if (high === 5 && low === 3) return "بنج سه";
            return singleNames[high] + " " + singleNames[low];
        }

        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem("p1_name")) document.getElementById("name-p1").value = localStorage.getItem("p1_name");
            if(localStorage.getItem("p2_name")) document.getElementById("name-p2").value = localStorage.getItem("p2_name");
            if(localStorage.getItem("p1_score")) { winScores[1] = parseInt(localStorage.getItem("p1_score")); document.getElementById("score-1").innerText = `الفوز: ${winScores[1]}`; }
            if(localStorage.getItem("p2_score")) { winScores[2] = parseInt(localStorage.getItem("p2_score")); document.getElementById("score-2").innerText = `الفوز: ${winScores[2]}`; }
            saveAndSync();
            document.addEventListener("click", requestWakeLock, { once: true });
        });

        function saveAndSync() {
            localStorage.setItem("p1_name", document.getElementById("name-p1").value);
            localStorage.setItem("p2_name", document.getElementById("name-p2").value);
            localStorage.setItem("p1_score", winScores[1]);
            localStorage.setItem("p2_score", winScores[2]);
            
            const p1 = document.getElementById('name-p1').value;
            const p2 = document.getElementById('name-p2').value;
            document.getElementById('combo-1').innerText = activePlayer === 1 ? `- دورك عيني يا ${p1} -` : `انتظر ${p2}`;
            document.getElementById('combo-2').innerText = activePlayer === 2 ? `- دورك عيني يا ${p2} -` : `انتظر ${p1}`;
        }

        function addScore(pNum) {
            winScores[pNum]++;
            document.getElementById(`score-${pNum}`).innerText = `الفوز: ${winScores[pNum]}`;
            saveAndSync();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        function playAudioProfile(isFinal) {
            const profile = document.getElementById('soundProfile').value;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                if (profile === 'crystal') {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = 'sine';
                    let freq = isFinal ? 380 : (Math.random() * 400 + 450);
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + (isFinal ? 0.12 : 0.04));
                    gain.gain.setValueAtTime(isFinal ? 0.3 : 0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (isFinal ? 0.12 : 0.04));
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + (isFinal ? 0.12 : 0.04));
                } else {
                    const bufferSize = ctx.sampleRate * (isFinal ? 0.15 : 0.05);
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                    const noise = ctx.createBufferSource(); noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter(); filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(isFinal ? 380 : 700, ctx.currentTime);
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(isFinal ? 0.4 : 0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (isFinal ? 0.14 : 0.04));
                    noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
                    noise.start();
                }
            } catch(e) {}
        }

        function determineStarter() {
            if (isRolling) return;
            isRolling = true;
            const cubes = [document.getElementById('p1-d1'), document.getElementById('p2-d1')];
            const t1 = document.getElementById('combo-1'); const t2 = document.getElementById('combo-2');
            t1.innerText = "جاري القرعة..."; t2.innerText = "جاري القرعة...";
            cubes.forEach(c => c.classList.add('rolling'));

            let ticks = 0;
            const interval = setInterval(() => {
                cubes[0].innerText = Math.floor(Math.random() * 6) + 1;
                cubes[1].innerText = Math.floor(Math.random() * 6) + 1;
                playAudioProfile(false);
                ticks++;

                if (ticks > 14) {
                    clearInterval(interval);
                    cubes.forEach(c => c.classList.remove('rolling'));
                    playAudioProfile(true);

                    let f1 = Math.floor(Math.random() * 6) + 1;
                    let f2 = Math.floor(Math.random() * 6) + 1;
                    if (f1 === f2) { f1 = f1 === 6 ? 5 : f1 + 1; }
                    cubes[0].innerText = f1; cubes[1].innerText = f2;

                    const name1 = document.getElementById('name-p1').value;
                    const name2 = document.getElementById('name-p2').value;

                    if (f1 > f2) { activePlayer = 1; t1.innerText = `👑 يبدي ${name1}!`; t2.innerText = `يبدي ${name1}`; } 
                    else { activePlayer = 2; t1.innerText = `يبدي ${name2}`; t2.innerText = `👑 يبدي ${name2}!`; }

                    setTimeout(() => {
                        document.getElementById('zone-1').classList.toggle('active-turn', activePlayer === 1);
                        document.getElementById('zone-2').classList.toggle('active-turn', activePlayer === 2);
                        saveAndSync(); isRolling = false;
                    }, 2000);
                }
            }, 60);
        }

        function roll(playerNum) {
            if (isRolling || activePlayer !== playerNum) return;
            isRolling = true;

            const cubes = [
                document.getElementById(`p${playerNum}-d1`),
                document.getElementById(`p${playerNum}-d2`)
            ];
            const comboText1 = document.getElementById('combo-1');
            const comboText2 = document.getElementById('combo-2');
            const currentZone = document.getElementById(`zone-${playerNum}`);
            
            currentZone.classList.remove('flash-shadhar-active', 'flash-kahraman-active');

            if (navigator.vibrate) navigator.vibrate(35);
            cubes.forEach(c => c.classList.add('rolling'));

            let ticks = 0;
            const run = setInterval(() => {
                const r1 = Math.floor(Math.random() * 6) + 1;
                const r2 = Math.floor(Math.random() * 6) + 1;
                cubes[0].innerText = r1;
                cubes[1].innerText = r2;

                playAudioProfile(false);
                if (navigator.vibrate && ticks % 3 === 0) navigator.vibrate(10);
                ticks++;

                if (ticks > 12) {
                    clearInterval(run);
                    cubes.forEach(c => c.classList.remove('rolling'));
                    
                    const finalR1 = Math.floor(Math.random() * 6) + 1;
                    const finalR2 = Math.floor(Math.random() * 6) + 1;
                    cubes[0].innerText = finalR1;
                    cubes[1].innerText = finalR2;

                    playAudioProfile(true);

                    const name = getComboName(finalR1, finalR2);
                    comboText1.innerText = name; comboText2.innerText = name;

                    if (finalR1 === finalR2) {
                        const flashClass = playerNum === 1 ? 'flash-shadhar-active' : 'flash-kahraman-active';
                        currentZone.classList.add(flashClass);
                    }

                    appendPermanentHistory(playerNum, finalR1, finalR2, name);
                    if (navigator.vibrate) navigator.vibrate(70);

                    setTimeout(() => {
                        switchTurn();
                        isRolling = false;
                    }, 1800);
                }
            }, 60);
        }

        function appendPermanentHistory(playerNum, r1, r2, name) {
            const hScroll1 = document.getElementById('history-1');
            const hScroll2 = document.getElementById('history-2');
            const pName = document.getElementById(`name-p${playerNum}`).value;
            
            const createCard = () => {
                const card = document.createElement('div');
                card.className = `history-card card-p${playerNum}`;
                card.innerHTML = `<span class="card-nums">${r1}:${r2}</span> <span style="font-size:10px; opacity:0.6;">${pName}</span> <span class="card-text">(${name})</span>`;
                return card;
            };

            hScroll1.insertBefore(createCard(), hScroll1.firstChild);
            hScroll2.insertBefore(createCard(), hScroll2.firstChild);
            hScroll1.scrollLeft = 0; hScroll2.scrollLeft = 0;
        }

        function switchTurn() {
            document.getElementById(`zone-${activePlayer}`).classList.remove('active-turn', 'flash-shadhar-active', 'flash-kahraman-active');
            activePlayer = activePlayer === 1 ? 2 : 1;
            document.getElementById(`zone-${activePlayer}`).classList.add('active-turn');
            saveAndSync();
        }

        let lastX, lastY, lastZ;
        window.addEventListener('devicemotion', (e) => {
            if (isRolling || !motionPermissionGranted) return;
            let acc = e.accelerationIncludingGravity; if (!acc) return;
            if (lastX === undefined) { lastX = acc.x; lastY = acc.y; lastZ = acc.z; return; }
            let deltaX = Math.abs(acc.x - lastX); let deltaY = Math.abs(acc.y - lastY);
            if (deltaX > 20 && deltaY > 20) { roll(activePlayer); requestWakeLock(); }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        });
    </script>
</body>
</html>
